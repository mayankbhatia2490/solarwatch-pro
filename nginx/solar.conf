server {
    listen 80;
    server_name _;

    # ── API → solar-api container ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://solar-api:8090/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── FastAPI docs (useful for debugging) ──────────────────────────────────────
    location /docs {
        proxy_pass         http://solar-api:8090/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
    location /openapi.json {
        proxy_pass         http://solar-api:8090/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Everything else → Next.js frontend ──────────────────────────────────────
    location / {
        proxy_pass         http://solar-frontend:3010/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
