version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: solar-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-solar}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-solar_metrics}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}

  grafana:
    image: grafana/grafana:latest
    container_name: solar-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    depends_on:
      - influxdb

  solar-collector:
    build: ./collector
    container_name: solar-collector
    restart: unless-stopped
    volumes:
      - ./data/collector:/app/data
    environment:
      - SHINEMONITOR_USERNAME=${SHINEMONITOR_USERNAME}
      - SHINEMONITOR_PASSWORD=${SHINEMONITOR_PASSWORD}
      - SHINEMONITOR_COMPANY_KEY=${SHINEMONITOR_COMPANY_KEY}
      - SHINEMONITOR_PLANT_ID=${SHINEMONITOR_PLANT_ID}
      - SHINEMONITOR_PN=${SHINEMONITOR_PN}
      - SHINEMONITOR_SN=${SHINEMONITOR_SN}
      - SHINEMONITOR_DEVCODE=${SHINEMONITOR_DEVCODE}
      - LATITUDE=${LATITUDE}
      - LONGITUDE=${LONGITUDE}
      - TIMEZONE=${TIMEZONE}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-solar}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-solar_metrics}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
      - INSTALLED_CAPACITY_W=${INSTALLED_CAPACITY_W}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - influxdb
    healthcheck:
      test: ["CMD-SHELL", "find /app/data/heartbeat.txt -mmin -15 2>/dev/null | grep -q . || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

  solar-api:
    build: ./solar-api
    container_name: solar-api
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./data/api:/app/data
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-solar}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-solar_metrics}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - INSTALLED_CAPACITY_W=${INSTALLED_CAPACITY_W:-3500}
      - ELECTRICITY_TARIFF_INR=${ELECTRICITY_TARIFF_INR:-6.5}
      - SYSTEM_COST_INR=${SYSTEM_COST_INR:-220000}
      - INSTALLATION_DATE=${INSTALLATION_DATE:-2025-04-17}
      - PLANT_NAME=${PLANT_NAME:-My Solar System}
      - LATITUDE=${LATITUDE:-29.6857}
      - LONGITUDE=${LONGITUDE:-76.9905}
    depends_on:
      - influxdb

  solar-frontend:
    build:
      context: ./solar-frontend
      args:
        - NEXT_PUBLIC_API_URL=http://192.168.1.20:8090
    container_name: solar-frontend
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - HOSTNAME=0.0.0.0
    depends_on:
      - solar-api
